- type: Features
  data:
  - name: Direct Deposit Switch
    description: Move a customer's direct deposit allocations to a new institution
      via PreMatch (credential-less I-9 match), NativeLink (device-saved credentials),
      or Forms; routed by the Prime algorithm for highest conversion.
  - name: Income & Employment Verification (Verify)
    description: Real-time payroll-connected verification returning identity, employment
      status, paystubs, shifts, and tax forms from the source payroll system.
  - name: Tax Form Retrieval
    description: Pull W-2, 1099-K, 1099-MISC, and 1099-NEC documents directly from
      payroll providers as PDF and structured JSON.
  - name: Bill Switch
    description: Update stored payment methods across merchant and biller accounts
      so issuers can capture recurring card-on-file spend.
  - name: Bill Manager
    description: Auto-detect, organize, and act on recurring bills and subscriptions
      with 80% greater accuracy than category-based detection.
  - name: Switch Kit
    description: Bundled Deposit Switch + Bill Switch onboarding flow productized
      for primary-banking activation.
  - name: Connected Accounts
    description: Ongoing consented access to payroll and external account data for
      re-underwriting, servicing, and credential refresh.
  - name: Pinwheel Link
    description: Drop-in UI for Web, iOS, Android, React Native, Flutter, and Capacitor
      that handles consent, MFA, and credential capture across 1,600+ payroll platforms.
  - name: Consumer Reporting Agency (CRA) Status
    description: First payroll-connectivity provider designated as a CRA, allowing
      Verify outputs to be used directly in FCRA-governed credit decisions.
  - name: Coverage
    description: 1,600+ supported payroll platforms reaching an estimated 80% of U.S.
      workers.
  - name: Webhooks with Signing & Optional Payload Encryption
    description: Asynchronous event delivery for job completions, link events, account
      status changes, and banking events with HMAC signatures and optional encryption.
  - name: Sandbox Environment
    description: Full-feature sandbox with synthetic users, employers, jobs, and webhook
      event simulation.
  - name: Versioned API
    description: Dated API versions selectable via header (v2022-03-02 through v2025-07-08+).
  sources:
  - https://pinwheelapi.com/
