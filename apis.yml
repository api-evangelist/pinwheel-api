  updated: '2026-05-25'
- type: UseCases
  data:
  - name: Banking Primacy
    description: National banks, credit unions, and challenger banks use Deposit Switch
      + Bill Switch to make a newly-opened account the customer's primary financial
      relationship.
  - name: Mortgage & Auto Lending
    description: Lenders use Verify as a real-time alternative to Work Number for
      payroll-direct income and employment verification.
  - name: Personal Loan / BNPL Underwriting
    description: Consumer lenders use Verify and Connected Accounts to refresh income
      at underwriting and during re-pricing windows.
  - name: Tax Preparation
    description: Tax-prep software uses the Taxes API to skip manual W-2 / 1099 uploads
      and pull forms directly from payroll.
  - name: Gig Worker Quarterly Tax Estimation
    description: Gig platforms use prior-year 1099 retrieval to power quarterly self-employment
      tax estimates for their workers.
  - name: Property Management & Rental Screening
    description: Property managers use Verify to confirm tenant employment and income
      at application time.
  - name: Subscription & Recurring Bill Management
    description: Personal finance apps and challenger banks use Bill Manager to give
      users a single view of recurring obligations with one-click switch and cancel.
- type: Integrations
  data:
  - name: ADP
    description: Direct payroll-provider integration for verification, paystubs, and
      deposit allocation.
  - name: Workday
    description: Direct payroll-provider integration covering enterprise employers.
  - name: Paychex
    description: SMB-focused payroll integration.
  - name: Paycom
    description: Mid-market payroll integration.
  - name: Gusto
    description: SMB cloud payroll integration covering startups and small employers.
  - name: Rippling
    description: HRIS + payroll integration.
  - name: 1,600+ Additional Payroll Platforms
    description: Long-tail coverage including local processors, government payroll,
      and industry-specific systems.
- type: Solutions
  data:
  - name: For Banks & Credit Unions
    description: Primary banking activation via Switch Kit; deposit and recurring-payment
      capture to drive balance, engagement, and lifetime value.
  - name: For Lenders
    description: FCRA-grade payroll-connected income, employment, and tax-form verification
      for mortgage, auto, personal loan, and BNPL underwriting.
  - name: For Fintechs & Challenger Banks
    description: Drop-in Pinwheel Link plus Connected Accounts to power onboarding,
      direct deposit capture, and ongoing data refresh.
  - name: For Tax & Payroll Software
    description: Direct W-2/1099 retrieval and tax-platform webhooks for tax-prep
      flows and gig-worker tax tools.
  - name: For Property Managers & Gig Platforms
    description: Real-time employment and income verification at application time,
      plus shift data for hourly workers.
